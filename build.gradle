import org.gradle.jvm.toolchain.JavaLanguageVersion

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id("com.github.ben-manes.versions") version "0.54.0"
}

group = 'net.amygdalum'
description = 'A Test Framework for testing Responsive Layouts'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }

    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
    mavenLocal()
}

sourceSets {
    examples {
        java {
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
            srcDirs = [file('src/examples/java')]
        }
        resources {
            srcDirs = [file('src/examples/resources')]
        }
    }
}

configurations.named("examplesImplementation") {
    extendsFrom configurations.testImplementation
}

dependencies {
    api 'org.junit.platform:junit-platform-engine:1.14.4'
    api 'org.junit.platform:junit-platform-commons:1.14.4'
    api 'org.seleniumhq.selenium:selenium-java:4.44.0'

    testImplementation 'org.junit.platform:junit-platform-engine:1.14.4'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.14.4'

    examplesImplementation 'org.junit.jupiter:junit-jupiter-api:5.14.4'
    examplesImplementation 'io.github.bonigarcia:webdrivermanager:6.3.4'
    examplesImplementation 'io.undertow:undertow-core:2.4.1.Final'
    examplesImplementation 'ch.qos.logback:logback-classic:1.5.32'
    examplesImplementation 'org.slf4j:jul-to-slf4j:2.0.18'

    examplesImplementation 'net.amygdalum:fluent-allotropy:0.0.6'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes(
            'Automatic-Module-Name': 'net.amygdalum.allotropy'
        )
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'Allotropy'
                description = 'A Test Framework for testing Responsive Layouts'
                url = 'https://github.com/almondtools/allotropy'

                licenses {
                    license {
                        name = 'GNU Lesser General Public License v3.0'
                        url = 'https://www.gnu.org/licenses/lgpl-3.0.txt'
                    }
                }

                developers {
                    developer {
                        id = 'amygdalum'
                        name = 'Stefan Mandel'
                        email = 'mail@amygdalum.net'
                    }
                }

                scm {
                    connection = 'scm:git:https://github.com/almondtools/allotropy.git'
                    developerConnection = 'scm:git:https://github.com/almondtools/allotropy.git'
                    url = 'https://github.com/almondtools/allotropy'
                }
            }
        }
    }
}

signing {
    useGpgCmd()
    sign publishing.publications.mavenJava
}


tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
    options.addBooleanOption('Xdoclint:none', true)
}